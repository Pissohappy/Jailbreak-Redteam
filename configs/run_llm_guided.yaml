# Example run configuration with LLM-guided expand strategy
# Copy this file and modify as needed

run_id: demo-run-llm-guided-001

target_vllm_base_url: "http://localhost:8008"
target_vllm_model: "qwen3-vl-8b"
target_vllm_api_key: "dummy"

judge_base_url: "http://localhost:8008"
judge_model: "qwen3-vl-8b"
# Optional: "multidim" (default) or "strongreject"
judge_mode: "multidim"

beam_width: 2
per_branch_candidates: 2
max_rounds: 3

enable_vision: true
temperature: 0.2
max_tokens: 256
concurrency: 8

# Multi-turn history strategy for Execute/Select.
# - inherit_parent: use previous branch history (default)
# - none: no previous history
# - memory: delegate to a memory provider/store hook
history_strategy: "inherit_parent"
history_memory_key: "history"

# Expand strategy configuration
# Options: "random_sampling" (default) or "llm_guided"
expand_strategy: "llm_guided"

# LLM-guided strategy specific settings (only used when expand_strategy: "llm_guided")
llm_guide:
  # LLM client for attack selection (optional, defaults to target model)
  base_url: "http://localhost:8008"
  model: "qwen3-vl-8b"
  api_key: "dummy"
  temperature: 0.7
  max_tokens: 1024
  # Maximum history rounds to include in context (null = all)
  max_history_rounds: null

enabled_attacks:
  - attacks_strategy.figstep.attack:FigStepAttack
  - attacks_strategy.jood.attack:JOODAttack
  - attacks_strategy.arttextfigstep.attack:ArttextFigStepAttack

attack_weights:
  attacks_strategy.figstep.attack:FigStepAttack: 1.0
  attacks_strategy.jood.attack:JOODAttack: 1.0
  attacks_strategy.arttextfigstep.attack:ArttextFigStepAttack: 1.0

attack_init_kwargs:
  attacks_strategy.figstep.attack:FigStepAttack:
    output_image_dir: runs/demo-run-llm-guided-001/generated_images
    config:
      font_path: /mnt/disk1/szchen/VLMBenchmark/repo/Jailbreak-Redteam/attacks_strategy/Arial Font/ARIAL.TTF
      font_size: 70
      wrap_width: 18
      steps: 3
  attacks_strategy.jood.attack:JOODAttack:
    output_image_dir: runs/demo-run-llm-guided-001/generated_images
    config:
      harmless_image_path: /mnt/disk1/szchen/VLMBenchmark/repo/OmniSafeBench-MM/dataset/apple.png
      aug: mixup
      lam: 0.5
  attacks_strategy.arttextfigstep.attack:ArttextFigStepAttack:
    output_image_dir: runs/demo-run-llm-guided-001/generated_images
    config:
      font_path: "/mnt/disk1/szchen/VLMBenchmark/repo/Jailbreak-Redteam/attacks_strategy/Arial Font/ARIAL.TTF"
      font_size: 70
      wrap_width: 18
      steps: 3
      image_width: 1024
      image_height: 1024
      margin_x: 36
      margin_y: 28
      spacing: 10
      fg: "#000000"
