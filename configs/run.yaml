run_id: demo-run-001

target_vllm_base_url: ""
target_vllm_model: "dummy-model"
target_vllm_api_key: ""

judge_base_url: ""
judge_model: "judge-model"

beam_width: 2
per_branch_candidates: 2
max_rounds: 3

enable_vision: true
temperature: 0.2
max_tokens: 256
concurrency: 8

enabled_attacks:
  # - demo_figstep
  - attacks_strategy.figstep.attack:FigStepAttack
  - attacks_strategy.jood.attack:JOODAttack
  - attacks_strategy.arttextfigstep.attack:ArttextFigStepAttack

# Optional: per-attack weight for weighted sampling.
attack_weights:
  # demo_figstep: 1.0
  attacks_strategy.figstep.attack:FigStepAttack: 1.0
  attacks_strategy.jood.attack:JOODAttack: 1.0
  attacks_strategy.arttextfigstep.attack:ArttextFigStepAttack: 1.0

# Optional: kwargs for user attacks referenced by entrypoint.
# attack_init_kwargs: {}
attack_init_kwargs:
  attacks_strategy.figstep.attack:FigStepAttack:
    output_image_dir: runs/demo-run-001/generated_images
    config:
      font_path: attacks/Arial Font/ARIAL.TTF
      font_size: 70
      wrap_width: 18
      steps: 3
  attacks_strategy.jood.attack:JOODAttack:
    output_image_dir: runs/demo-run-001/generated_images
    config:
      harmless_image_path: dataset/apple.png
      aug: mixup
      lam: 0.5  # Mixing parameter alpha
  attacks_strategy.arttextfigstep.attack:ArttextFigStepAttack:
    output_image_dir: runs/demo-run-001/generated_images
    config:
      font_path: "attacks/Arial Font/ARIAL.TTF"
      font_size: 70
      wrap_width: 18
      steps: 3
      image_width: 1024
      image_height: 1024
      margin_x: 36
      margin_y: 28
      spacing: 10
      fg: "#000000"
