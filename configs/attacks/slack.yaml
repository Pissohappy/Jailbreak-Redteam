  background_path: "attacks_strategy/socialmedia/slack.png"

  # Font configuration (auto-detect if not specified)
  # font_path: "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"

  # LLM configuration (for message content generation)
  llm_model_name: "gpt-4o-mini"
  llm_base_url: "https://api.whatai.cc"  # Optional: override default
